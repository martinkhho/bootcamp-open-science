name: Quarto Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::knitr
            any::rmarkdown

      - name: Verify R dependencies
        shell: Rscript {0}
        run: |
          required <- c("knitr", "rmarkdown")
          missing <- required[!vapply(required, requireNamespace, logical(1), quietly = TRUE)]
          if (length(missing)) {
            stop("Missing R packages: ", paste(missing, collapse = ", "))
          }
          message(
            "R dependencies available: ",
            paste(
              required,
              vapply(required, function(x) as.character(packageVersion(x)), character(1)),
              collapse = "; "
            )
          )

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install TinyTeX
        run: quarto install tinytex --update-path

      - name: Render Quarto book
        run: quarto render docs

      - name: Render Reveal.js slides
        run: |
          quarto render docs/slides.qmd
          cp docs/slides.html docs/_book/slides.html
          cp docs/slides.css docs/_book/slides.css
          cp -R docs/slides_files docs/_book/slides_files

      - name: Render slides PDF
        run: |
          "${{ steps.setup-chrome.outputs.chrome-path }}" \
            --headless \
            --no-sandbox \
            --disable-gpu \
            --allow-file-access-from-files \
            --virtual-time-budget=10000 \
            --no-pdf-header-footer \
            --print-to-pdf=docs/slides.pdf \
            "file://${GITHUB_WORKSPACE}/docs/slides.html?print-pdf"
          cp docs/slides.pdf docs/_book/slides.pdf

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
